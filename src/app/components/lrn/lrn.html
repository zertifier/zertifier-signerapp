<h1 class="text-2xl font-semibold tracking-tight text-gray-900 dark:text-white mb-4">
  Legal Registration Number (LRN)
</h1>

<!-- Real/Test Tabs -->
<div role="tablist" aria-label="LRN mode" class="mb-6 flex gap-2 border-b border-gray-200 dark:border-gray-700">
  <button type="button"
          role="tab"
          [attr.aria-selected]="mode() === 'real'"
          (click)="setMode('real')"
          class="px-4 py-2 text-sm rounded-t-lg"
          [class.bg-white]="mode() === 'real'"
          [class.dark:bg-gray-800]="mode() === 'real'"
          [class.font-semibold]="mode() === 'real'"
          [class.text-gray-900]="mode() === 'real'"
          [class.text-gray-600]="mode() !== 'real'"
  >Real</button>
  <button type="button"
          role="tab"
          [attr.aria-selected]="mode() === 'test'"
          (click)="setMode('test')"
          class="px-4 py-2 text-sm rounded-t-lg"
          [class.bg-white]="mode() === 'test'"
          [class.dark:bg-gray-800]="mode() === 'test'"
          [class.font-semibold]="mode() === 'test'"
          [class.text-gray-900]="mode() === 'test'"
          [class.text-gray-600]="mode() !== 'test'"
  >Test</button>
</div>

<form class="space-y-4 mb-6"  (ngSubmit)="onFetch()">
    <!-- Clearinghouse -->
    <div class="min-w-0">
      <label for="clearinghouse" class="mb-2 block text-sm font-medium text-gray-900 dark:text-white">Clearing house</label>
      <select
        id="clearinghouse"
        name="clearinghouse"
        [(ngModel)]="clearingHouse"
        class="w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400 dark:focus:border-blue-500 dark:focus:ring-blue-500"
      >
        @for (house of clearingHouses(); track house) {
          <option [value]="house">{{ house }}</option>
        }
      </select>
    </div>

    <!-- VatID -->
    <div class="min-w-0">
      <label for="vatid" class="mb-2 block text-sm font-medium text-gray-900 dark:text-white">VatID</label>
      <input
        id="vatid"
        name="vatid"
        type="text"
        [(ngModel)]="vatId"
        autocomplete="off"
        class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-2 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400 dark:focus:border-blue-500 dark:focus:ring-blue-500"
      />
    </div>

    <!-- URL -->
    <div class="min-w-0">
      <label for="url" class="mb-2 block text-sm font-medium text-gray-900 dark:text-white">URL</label>
      <input
        id="url"
        name="url"
        type="text"
        [(ngModel)]="url"
        placeholder="https://example.com"
        class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-2 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400 dark:focus:border-blue-500 dark:focus:ring-blue-500"
      />
    </div>

  <div class="flex items-center justify-end">
    <button
      type="submit"
      [disabled]="!canFetch()"
      class="inline-flex items-center rounded-lg bg-blue-700 px-5 py-2.5 text-sm font-medium text-white hover:bg-blue-800 focus:outline-none focus:ring-4 focus:ring-blue-300 disabled:cursor-not-allowed disabled:opacity-60 dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800"
    >
      Fetch
    </button>
  </div>
</form>

<!-- Result Accordion -->
@if (credentialsProvider.legalRegistrationNumber()) {
  <div class="rounded-lg border border-gray-200 bg-white dark:border-gray-700 dark:bg-gray-800">
    <button
      type="button"
      class="flex w-full items-center justify-between px-4 py-3 text-left text-gray-900 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:text-white dark:hover:bg-gray-700"
      [attr.aria-expanded]="expanded()"
      (click)="expanded.set(!expanded())"
    >
      <span class="font-medium">JSON Preview</span>
      <svg
        class="h-5 w-5 transition-transform duration-200" [class.rotate-180]="expanded()"
        xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
        aria-hidden="true"
      >
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
      </svg>
    </button>

    @if (expanded()) {
      <div class="border-t border-gray-200 p-4 dark:border-gray-700">
        <div class="flex items-center justify-end mb-2">
          <button type="button" (click)="copyJson(credentialsProvider.legalRegistrationNumber())" class="inline-flex items-center rounded-md bg-gray-100 px-3 py-1.5 text-xs font-medium text-gray-900 hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-300 dark:bg-gray-700 dark:text-white dark:hover:bg-gray-600">Copy JSON</button>
        </div>
        <div class="w-full max-w-full max-h-96 overflow-x-auto overflow-y-auto rounded bg-gray-900 p-4">
          <pre class="m-0 whitespace-pre text-sm text-gray-100">
            <code>{{ credentialsProvider.legalRegistrationNumber() | json }}</code>
          </pre>
        </div>
      </div>
    }
  </div>
}
