@let content = c();
<div class="flex flex-col gap-3">
  <h1 class="text-2xl mx-auto font-bold">Legal registration number</h1>

  <app-form-divider label="Input"></app-form-divider>

  <div class="flex flex-row items-center">
    <label class="w-32 mx-2 text-lg">vatId:</label>
    <input type="text" placeholder="A123456B" [(ngModel)]="state.vatId"
           class="grow bg-gray-800  text-white placeholder:text-gray-500 rounded-lg"/>
  </div>

  <app-form-selector label="Clearing house:" labelClass="w-32"
                     [selected]="state.ch"
                     [collection]="APPROVED_CHS"></app-form-selector>

  <app-form-divider label="Actions"></app-form-divider>

  <div class="flex flex-row gap-3">
    <app-action-button (onClick)="state.fetchLnr()" [isDisabled]="state.isLoading()">
      @if (state.isLoading()) {
        Fetching…
      } @else {
        Fetch Clearing House
      }
    </app-action-button>
    <app-action-button (onClick)="state.copyToClipboard(content)" [isDisabled]="!content">📋</app-action-button>
  </div>

  @if (content) {
    <app-form-divider label="Result"></app-form-divider>
    <app-result-block [content]="content"></app-result-block>
  }
</div>
