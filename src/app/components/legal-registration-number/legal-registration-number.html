<div class="flex flex-col gap-3">
  <h1 class="text-2xl mx-auto font-bold">Legal registration number</h1>
  <div class="flex items-center gap-3">
    <span class="whitespace-nowrap font-medium text-gray-400">Input</span>
    <hr class="flex-1 my-2 border-gray-600">
  </div>

  <div class="flex flex-row items-center">
    <label class="w-32 mx-2 text-lg">vatId:</label>
    <input type="text" placeholder="A123456B" [(ngModel)]="state.vatId"
           class="grow bg-gray-800  text-white placeholder:text-gray-500 rounded-lg"/>
  </div>

  <div class="flex flex-row items-center">
    <label class="w-32 mx-2 text-lg">Clearing house:</label>
    <select [(ngModel)]="state.lnrCH" class="grow rounded-lg bg-gray-700 text-white">
      @for (ch of APPROVED_CHS; track $index) {
        <option [ngValue]="ch">{{ ch }}</option>
      }
    </select>
  </div>

  <div class="flex items-center gap-3">
    <span class="whitespace-nowrap font-medium text-gray-400">Actions</span>
    <hr class="flex-1 my-2 border-gray-600">
  </div>

  <div>
    <button type="button" (click)="state.fetchLnr()" [disabled]="state.isLoading()"
            class=" text-black bg-blue-400 hover:bg-blue-300 font-medium rounded-lg text-sm py-2 px-4 flex justify-center transition-all
           disabled:bg-gray-600">
      @if (state.isLoading()) {
        Fetching…
      } @else {
        Fetch Clearing House
      }
    </button>
  </div>

  @if (state.credentialProvider.lnr()) {
    <div class="flex items-center gap-3">
      <span class="whitespace-nowrap font-medium text-gray-400">Result</span>
      <hr class="flex-1 my-2 border-gray-600">
    </div>

    <!--    <code [ngModel]="state?.credentialProvider?.lnr()"></code>-->
    <pre class="text-sm bg-blue-950 text-green-200 mx-4 my-2 p-4
    rounded-lg overflow-auto">
      <code class="whitespace-pre-wrap">{{ state.credentialProvider.lnr() | json }}</code>
    </pre>
  }
</div>
