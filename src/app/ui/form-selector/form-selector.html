<div class="flex flex-row items-center">
  @if(label()){
    <label class="mx-2 text-lg" [class]="labelClass()">{{label()}}</label>
  }
  <select [(ngModel)]="selected" class="grow rounded-lg bg-gray-700 text-white">
    @for (el of collection; track $index) {
      <option [ngValue]="el">{{ el }}</option>
    }
  </select>
</div>
