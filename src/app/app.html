<!-- SCROLLABLE CONTENT AREAS CONTAINER -->
<div class="flex h-screen min-h-0" [class.flex-col]="!showTestArea()" [class.flex-row]="showTestArea()">
  <!-- MAIN AREA -->
  <section
    aria-labelledby="main-form-title"
    class="flex-1 min-h-0 min-w-0 h-full overflow-auto"
  >
    @if (showTestArea()) {
        <h2 class="mt-2 ms-2 text-3xl font-bold dark:text-white">Real Area</h2>
    }
    <app-component-container [testMode]="false" [stackLayout]="showTestArea()"></app-component-container>
  </section>

  <!-- TEST AREA (shown when toggled) -->
  @if (showTestArea()) {
    <section
      class="flex-1 min-h-0 min-w-0 h-full overflow-auto border-l border-gray-200 dark:bg-gray-950 bg-stone-100"
      aria-labelledby="test-form-title"
    >
      <h2 class="mt-2 ms-2 text-3xl font-bold dark:text-white">Test Area</h2>
      <app-component-container [testMode]="true"></app-component-container>
    </section>
  }
</div>

<!-- DEBUG TOGGLER BUTTON (bottom-right) -->
<button
  type="button"
  class="fixed bottom-4 right-4 z-50 inline-flex items-center justify-center w-12 h-12 rounded-full bg-blue-600 text-white shadow-lg hover:bg-blue-700 focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-blue-300 dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus-visible:ring-blue-800"
  (click)="toggleTestArea()"
  aria-label="Toggle debug panel"
  title="Toggle debug panel"
>
  <!-- Debug logo (inline SVG from Flowbite icon set) -->
  <svg class="w-6 h-6 text-white dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 19 20">
    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 3 6 2V1m5 2 1-1V1M9 7v11M9 7a5 5 0 0 1 5 5M9 7a5 5 0 0 0-5 5m5-5a4.959 4.959 0 0 1 2.973 1H12V6a3 3 0 0 0-6 0v2h.027A4.959 4.959 0 0 1 9 7Zm-5 5H1m3 0v2a5 5 0 0 0 10 0v-2m3 0h-3m-9.975 4H2a1 1 0 0 0-1 1v2m13-3h2.025a1 1 0 0 1 1 1v2M13 9h2.025a1 1 0 0 0 1-1V6m-11 3H3a1 1 0 0 1-1-1V6"></path>
  </svg>
  <span class="sr-only">Toggle debug panel</span>
</button>

<app-toast-container></app-toast-container>
<router-outlet />
