<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ZertifierSignerapp</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  // NOTE change favicon?
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    // Enable Tailwind dark mode via class, synced to OS preference
    (function() {
      const mql = window.matchMedia('(prefers-color-scheme: dark)');
      const apply = () => document.documentElement.classList.toggle('dark', mql.matches);
      apply();
      if (mql.addEventListener) mql.addEventListener('change', apply);
        // NOTE depreciated functions
      else if (mql.addListener) mql.addListener(apply);
    })();
  </script>
</head>
<body class="min-h-screen bg-white text-gray-900 dark:bg-gray-900 dark:text-gray-100">
  <app-root></app-root>
</body>
</html>
